{% extends 'base.html' %}

{% block title %}Eliminar{% endblock %}

{% block content %}
    <div class="detalle-wrapper">
        <h1>¿Estás seguro de que deseas eliminar este/a {{ tipo }}?</h1>
        <p>"{{ objeto }}"</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar definitivamente</button>
        </form>
        <br>
        <a class="btn btn-secondary" href="{% url 'lista_recetas' %}">Cancelar y regresar</a>
    </div>
{% endblock %}
