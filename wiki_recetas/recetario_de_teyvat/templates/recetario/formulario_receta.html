{% extends 'base.html' %}

{% block title %}{{ accion }} Receta - Recetario de Teyvat{% endblock %}

{% block content %}
    <div class="container" style="max-width: 600px; padding: 0;">
        <div class="detalle-wrapper">
            <h2>{{ accion }} Receta</h2>
            <hr style="border: 1px solid #e2e8f0; margin-bottom: 20px;">
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn">Guardar Cambios</button>
                    <a href="{% url 'lista_recetas' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
