{% extends 'base.html' %}

{% block title %}{{ accion }} Receta{% endblock %}

{% block content %}
    <div class="detalle-wrapper">
        <h1>{{ accion }} Receta</h1>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Guardar Receta</button>
        </form>
        <br>
        <a class="btn btn-secondary" href="{% url 'lista_recetas' %}">Cancelar</a>
    </div>
{% endblock %}
